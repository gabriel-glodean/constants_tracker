# ops-tool jobs for k8s — seed, clear, clear-demo, and seed-auth-user.
# All logic lives in the ops-tool container; these manifests only wire env vars.

kind: Job
apiVersion: batch/v1
metadata:
  name: seed-job
  namespace: constant-tracker
  labels:
    app: seed-job
spec:
  backoffLimit: 0
  template:
    spec:
      volumes:
        - name: jars-v1
          hostPath:
            path: /opt/constant-tracker/demo-crud-server/build/libs
        - name: jars-v2
          hostPath:
            path: /opt/constant-tracker/demo-crud-server-v2/build/libs
      containers:
        - name: seed
          image: ghcr.io/gabriel-glodean/ops-tool:latest
          volumeMounts:
            - name: jars-v1
              mountPath: /seed/jars/v1
            - name: jars-v2
              mountPath: /seed/jars/v2
          env:
            - name: CMD
              value: "seed"
            - name: APP_URL
              value: "http://app:8080"
            - name: PROJECT
              value: "demo-crud-server"
            - name: AUTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CONSTANTS_AUTH_ENABLED
            - name: DEMO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: DEMO_USERNAME
            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: DEMO_PASSWORD
      restartPolicy: Never

---

kind: Job
apiVersion: batch/v1
metadata:
  name: clear-job
  namespace: constant-tracker
  labels:
    app: clear-job
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: clear
          image: ghcr.io/gabriel-glodean/ops-tool:latest
          env:
            - name: CMD
              value: "clear"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
      restartPolicy: Never

---

kind: Job
apiVersion: batch/v1
metadata:
  name: clear-demo-job
  namespace: constant-tracker
  labels:
    app: clear-demo-job
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: clear-demo
          image: ghcr.io/gabriel-glodean/ops-tool:latest
          env:
            - name: CMD
              value: "clear-demo"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DEMO_PROJECT
              value: "demo-crud-server"
      restartPolicy: Never

---

kind: Job
apiVersion: batch/v1
metadata:
  name: seed-auth-user-job
  namespace: constant-tracker
  labels:
    app: seed-auth-user-job
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: seed-auth-user
          image: ghcr.io/gabriel-glodean/ops-tool:latest
          env:
            - name: CMD
              value: "seed-auth-user"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SPRING_FLYWAY_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SPRING_FLYWAY_PASSWORD
            - name: DEMO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: DEMO_USERNAME
            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: DEMO_PASSWORD
      restartPolicy: Never
