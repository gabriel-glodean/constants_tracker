services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: constant_tracker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${POSTGRES_HOST_PATH:-./.postgres_data}:/var/lib/postgresql/data"
    networks:
      - app_network

  solr:
    image: solr:latest
    container_name: solr
    # Precreate core with mounted config, then run in foreground
    command:
      - bash
      - -lc
      - >
        CORE=$${SOLR_CORE:-Constants};
        CORE_DIR=/var/solr/data/$$CORE;
        if [ ! -d "$$CORE_DIR" ]; then
          solr-precreate $$CORE /opt/solr-config;
        else
          cp /opt/solr-config/* $$CORE_DIR/conf/ 2>/dev/null || true;
        fi && exec solr-foreground --user-managed
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      - ${SOLR_HOST_PATH:-./.solr_data}:/var/solr/data
      - ./constant-tracker-app/solr/managed-schema.xml:/opt/solr-config/managed-schema.xml:ro
      - ./constant-tracker-app/solr/solrconfig.xml:/opt/solr-config/solrconfig.xml:ro
    networks:
      - app_network

  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app_network

  app:
    build:
      context: .
      dockerfile: constant-tracker-app/Dockerfile
    container_name: constant-tracker-app
    depends_on:
      solr:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    environment:
      - SERVER_PORT=8080
      # Solr base URL for Spring Data Solr / SolrJ
      - SPRING_DATA_SOLR_HOST=http://solr:8983/solr
      - CONSTANTS_SOLR_URL=http://solr:8983/solr/
      # Redis wiring
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # PostgreSQL R2DBC
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/constant_tracker
      - SPRING_R2DBC_USERNAME=${SPRING_R2DBC_USERNAME}
      - SPRING_R2DBC_PASSWORD=${SPRING_R2DBC_PASSWORD}
      # Flyway (JDBC for schema migrations)
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/constant_tracker
      - SPRING_FLYWAY_USER=${SPRING_FLYWAY_USER}
      - SPRING_FLYWAY_PASSWORD=${SPRING_FLYWAY_PASSWORD}
    networks:
      - app_network
  search-ui:
    build:
      context: ./search-ui
      dockerfile: Dockerfile
    container_name: search-ui
    ports:
      - "5173:80" # Host:Container (change 5173 to 80 or 8081 if you want production-like port)
    depends_on:
      - app
    networks:
      - app_network

  clear:
    image: alpine:latest
    container_name: clear
    profiles:
      - clear
    depends_on:
      - postgres
      - redis
      - solr
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache postgresql-client redis curl > /dev/null 2>&1
        echo "=== Clearing PostgreSQL ==="
        psql -h postgres -U ${POSTGRES_USER} -d constant_tracker -c "TRUNCATE unit_descriptors CASCADE;"
        echo "=== Clearing Solr ==="
        until curl -sf http://solr:8983/solr/Constants/admin/ping > /dev/null 2>&1; do sleep 1; done
        curl -sf -X POST "http://solr:8983/solr/Constants/update?commit=true" \
          -H "Content-Type: application/json" \
          -d '{"delete":{"query":"*:*"}}' && echo " Solr cleared"
        echo "=== Clearing Redis ==="
        redis-cli -h redis FLUSHALL && echo " Redis cleared"
        echo "=== Clear complete ==="
    networks:
      - app_network

  seed:
    image: curlimages/curl:latest
    container_name: seed
    profiles:
      - seed
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./demo-crud-server/build/libs:/seed/jars:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "=== Seeding demo data ==="
        for jar in /seed/jars/*.jar; do
          [ -f "$$jar" ] || continue
          echo "Uploading JAR: $$jar"
          jarname=$$(basename "$$jar")
          curl -sf -X POST "http://app:8080/jar?project=demo-crud-server&jarName=$$jarname" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$$jar" && echo " OK" || echo " FAILED"
        done
        for cls in /seed/classes/*.class; do
          [ -f "$$cls" ] || continue
          echo "Uploading class: $$cls"
          curl -sf -X POST "http://app:8080/class?project=samples" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$$cls" && echo " OK" || echo " FAILED"
        done
        echo "=== Seed complete ==="
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

