services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: constant_tracker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${POSTGRES_HOST_PATH:-./.postgres_data}:/var/lib/postgresql/data"
    networks:
      - app_network

  solr:
    image: solr:10.0.0
    container_name: solr
    # Precreate core with mounted config, then run in foreground
    command:
      - bash
      - -lc
      - >
        CORE=$${SOLR_CORE:-Constants};
        CORE_DIR=/var/solr/data/$$CORE;
        if [ ! -d "$$CORE_DIR" ]; then
          solr-precreate $$CORE /opt/solr-config;
        else
          cp /opt/solr-config/* $$CORE_DIR/conf/ 2>/dev/null || true;
        fi && exec solr-foreground --user-managed
    ports:
      - "127.0.0.1:${SOLR_PORT:-8983}:8983"
    volumes:
      - ${SOLR_HOST_PATH:-./.solr_data}:/var/solr/data
      - ./constant-tracker-app/solr/managed-schema.xml:/opt/solr-config/managed-schema.xml:ro
      - ./constant-tracker-app/solr/solrconfig.xml:/opt/solr-config/solrconfig.xml:ro
    networks:
      - app_network

  redis:
    image: redis:7
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    # No host ports exposed — reachable only via the internal app_network.
    # Binding to a host port on 0.0.0.0 would expose Redis to the public internet.
    networks:
      - app_network

  app:
    image: ${APP_IMAGE:-ghcr.io/gabriel-glodean/constant-tracker-app:latest}
    build:
      context: .
      dockerfile: constant-tracker-app/Dockerfile
    container_name: constant-tracker-app
    depends_on:
      solr:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    environment:
      - SERVER_PORT=8080
      - CONSTANTS_CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      # Solr base URL for Spring Data Solr / SolrJ
      - SPRING_DATA_SOLR_HOST=http://solr:8983/solr
      - CONSTANTS_SOLR_URL=http://solr:8983/solr/
      # Redis wiring
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # PostgreSQL R2DBC
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/constant_tracker
      - SPRING_R2DBC_USERNAME=${SPRING_R2DBC_USERNAME}
      - SPRING_R2DBC_PASSWORD=${SPRING_R2DBC_PASSWORD}
      # Flyway (JDBC for schema migrations)
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/constant_tracker
      - SPRING_FLYWAY_USER=${SPRING_FLYWAY_USER}
      - SPRING_FLYWAY_PASSWORD=${SPRING_FLYWAY_PASSWORD}
    networks:
      - app_network
  search-ui:
    image: ${UI_IMAGE:-ghcr.io/gabriel-glodean/constant-tracker-ui:latest}
    build:
      context: ./search-ui
      dockerfile: Dockerfile
    container_name: search-ui
    ports:
      - "5173:80" # Host:Container (change 5173 to 80 or 8081 if you want production-like port)
    depends_on:
      - app
    networks:
      - app_network

  clear:
    image: ${OPS_TOOL_IMAGE:-ghcr.io/gabriel-glodean/ops-tool:latest}
    build:
      context: .
      dockerfile: ops-tool/Dockerfile
    container_name: clear
    profiles:
      - clear
    depends_on:
      app:
        condition: service_healthy
    environment:
      CMD: clear
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - app_network

  clear-demo:
    image: ${OPS_TOOL_IMAGE:-ghcr.io/gabriel-glodean/ops-tool:latest}
    build:
      context: .
      dockerfile: ops-tool/Dockerfile
    container_name: clear-demo
    profiles:
      - clear-demo
    depends_on:
      app:
        condition: service_healthy
    environment:
      CMD: clear-demo
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEMO_PROJECT: ${DEMO_PROJECT:-demo-crud-server}
    networks:
      - app_network

  seed:
    image: ${OPS_TOOL_IMAGE:-ghcr.io/gabriel-glodean/ops-tool:latest}
    build:
      context: .
      dockerfile: ops-tool/Dockerfile
    container_name: seed
    profiles:
      - seed
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./demo-crud-server/build/libs:/seed/jars/v1:ro
      - ./demo-crud-server-v2/build/libs:/seed/jars/v2:ro
    environment:
      CMD: seed
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      DEMO_USERNAME: ${DEMO_USERNAME:-}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-}
    networks:
      - app_network

  seed-auth-user:
    image: ${OPS_TOOL_IMAGE:-ghcr.io/gabriel-glodean/ops-tool:latest}
    build:
      context: .
      dockerfile: ops-tool/Dockerfile
    container_name: seed-auth-user
    profiles:
      - seed-auth-user
    depends_on:
      app:
        condition: service_healthy
    environment:
      CMD: seed-auth-user
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEMO_USERNAME: ${DEMO_USERNAME}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

