# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ "main", "master", "develop", "feature/**", "fix/**", "release/**" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish all images to ghcr.io regardless of changed paths'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      app: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.app }}
      ui: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.ui }}
      ops: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.ops }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'constant-tracker-app/**'
              - 'constant-extractor-api/**'
              - 'constant-extractor-bytecode/**'
              - 'constant-extractor-config-file/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
            ui:
              - 'search-ui/**'
              - 'k8s/ui.yml'
              - 'k8s/ingress.yml'
            ops:
              - 'ops-tool/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'

  format-check:
    name: Format Check (Spotless)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

  build-and-test:
    name: Build & Test (Gradle, Java 25)
    runs-on: ubuntu-latest
    needs: [format-check, changes]
    if: needs.changes.outputs.app == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build & test all subprojects (skip heavy tests)
        run: ./gradlew clean build --no-daemon --continue -x heavyTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-app-logs
          path: |
            logs/app-*.log
            constant-extractor-api/build/test-results/
            constant-extractor-api/build/reports/
            constant-extractor-bytecode/build/test-results/
            constant-extractor-bytecode/build/reports/
            constant-extractor-config-file/build/test-results/
            constant-extractor-config-file/build/reports/
            constant-tracker-app/build/test-results/
            constant-tracker-app/build/reports/
            constant-tracker-app/build/logs/
            constant-tracker-app/build/testcontainers-logs/
          retention-days: 14

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            constant-extractor-api/build/jacocoHtml/
            constant-extractor-bytecode/build/jacocoHtml/
            constant-extractor-config-file/build/jacocoHtml/
            constant-tracker-app/build/jacocoHtml/
          retention-days: 14

  ui-check:
    name: UI Lint, Test & Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    defaults:
      run:
        working-directory: search-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: search-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

      - name: Upload UI coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: search-ui/coverage/
          retention-days: 14

  docker-build-app:
    name: Docker Build Sanity (App)
    runs-on: ubuntu-latest
    needs: [build-and-test, changes]
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build app Docker image
        run: docker build -f constant-tracker-app/Dockerfile -t constant_tracker:ci .

  docker-build-ui:
    name: Docker Build Sanity (UI)
    runs-on: ubuntu-latest
    needs: [ui-check, changes]
    if: needs.changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build UI Docker image
        run: docker build -f search-ui/Dockerfile -t constant_tracker_ui:ci search-ui/

  build-and-test-ops:
    name: Build & Test ops-tool
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ops == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build & test ops-tool
        run: cd ops-tool && ../gradlew build --no-daemon --continue

      - name: Upload ops-tool test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-tool-test-reports
          path: ops-tool/build/reports/
          retention-days: 14

  docker-build-ops:
    name: Docker Build Sanity (ops-tool)
    runs-on: ubuntu-latest
    needs: [build-and-test-ops, changes]
    if: needs.changes.outputs.ops == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build ops-tool Docker image
        run: docker build -f ops-tool/Dockerfile -t ops_tool:ci .

  publish-ops:
    name: Publish ops-tool image to ghcr.io
    runs-on: ubuntu-latest
    needs: [build-and-test-ops, changes]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.changes.outputs.ops == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (ops-tool)
        id: meta-ops
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ops-tool
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push ops-tool image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ops-tool/Dockerfile
          push: true
          tags: ${{ steps.meta-ops.outputs.tags }}
          labels: ${{ steps.meta-ops.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-app:
    name: Publish app image to ghcr.io
    runs-on: ubuntu-latest
    needs: [build-and-test, changes]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.changes.outputs.app == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/constant-tracker-app
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: constant-tracker-app/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-ui:
    name: Publish UI image to ghcr.io
    runs-on: ubuntu-latest
    needs: [ui-check, changes]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.changes.outputs.ui == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (ui)
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/constant-tracker-ui
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./search-ui
          file: search-ui/Dockerfile
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------
  # Force-republish: skips ALL tests; builds and pushes every image.
  # Only runs on workflow_dispatch with force_publish = true.
  # ---------------------------------------------------------------
  force-republish:
    name: Force Republish (${{ matrix.name }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.force_publish == true
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ui
            context: ./search-ui
            file: search-ui/Dockerfile
            image: constant-tracker-ui
          - name: app
            context: .
            file: constant-tracker-app/Dockerfile
            image: constant-tracker-app
          - name: ops-tool
            context: .
            file: ops-tool/Dockerfile
            image: ops-tool
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (${{ matrix.name }})
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

