# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["main", "develop", "feature/"]
  pull_request:

jobs:
  test:
    name: Build & Test (Gradle, Java 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: search-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: search-ui
        run: npm ci

      - name: Run ESLint (UI)
        working-directory: search-ui
        run: npm run lint

      - name: Run Jest (UI)
        working-directory: search-ui
        run: npm test -- --ci --coverage

      - name: Build & test all subprojects
        run: ./gradlew clean build test --continue

      - name: Upload logs and test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-app-logs
          path: |
            logs/app-*.log
            build/test-results/
            build/reports/
            build/logs/
            build/testcontainers-logs/
            constant-extractor-lib/build/test-results/
            constant-extractor-lib/build/reports/
            constant-extractor-lib/build/logs/
            constant-extractor-lib/build/testcontainers-logs/
            constant-tracker-app/build/test-results/
            constant-tracker-app/build/reports/
            constant-tracker-app/build/logs/
            constant-tracker-app/build/testcontainers-logs/

  docker-build:
    name: Dockerfile sanity build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f constant-tracker-app/Dockerfile -t constant_tracker:ci .
