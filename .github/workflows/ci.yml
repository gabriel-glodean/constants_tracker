# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ "main", "master", "develop", "feature/**", "fix/**", "release/**" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  format-check:
    name: Format Check (Spotless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

  build-and-test:
    name: Build & Test (Gradle, Java 25)
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build & test all subprojects (skip heavy tests)
        run: ./gradlew clean build --no-daemon --continue -x heavyTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-app-logs
          path: |
            logs/app-*.log
            constant-extractor-api/build/test-results/
            constant-extractor-api/build/reports/
            constant-extractor-bytecode/build/test-results/
            constant-extractor-bytecode/build/reports/
            constant-extractor-config-file/build/test-results/
            constant-extractor-config-file/build/reports/
            constant-tracker-app/build/test-results/
            constant-tracker-app/build/reports/
            constant-tracker-app/build/logs/
            constant-tracker-app/build/testcontainers-logs/
          retention-days: 14

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            constant-extractor-api/build/jacocoHtml/
            constant-extractor-bytecode/build/jacocoHtml/
            constant-extractor-config-file/build/jacocoHtml/
            constant-tracker-app/build/jacocoHtml/
          retention-days: 14

  ui-check:
    name: UI Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: search-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: search-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

      - name: Upload UI coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: search-ui/coverage/
          retention-days: 14

  docker-build:
    name: Docker Build Sanity
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build app Docker image
        run: docker build -f constant-tracker-app/Dockerfile -t constant_tracker:ci .

      - name: Build UI Docker image
        run: docker build -f search-ui/Dockerfile -t constant_tracker_ui:ci search-ui/

  publish:
    name: Publish Docker images to ghcr.io
    runs-on: ubuntu-latest
    needs: [build-and-test, ui-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── App image ────────────────────────────────────────────
      - name: Extract metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/constant-tracker-app
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: constant-tracker-app/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── UI image ─────────────────────────────────────────────
      - name: Extract metadata (ui)
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/constant-tracker-ui
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./search-ui
          file: search-ui/Dockerfile
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

