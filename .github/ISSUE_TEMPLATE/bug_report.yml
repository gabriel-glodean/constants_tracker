name: Bug Report
description: Report a bug or unexpected behaviour
labels: [ "bug", "triage" ]
body:
  - type: checkboxes
    id: existing-issue
    attributes:
      label: Pre-flight check
      options:
        - label: I have searched existing issues and this has not been reported yet.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps that reliably trigger the issue.
      placeholder: |
        1. POST /class with payload …
        2. Observe response …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - constant-extractor-api
        - constant-extractor-bytecode
        - constant-extractor-config-file
        - constant-tracker-app
        - search-ui
        - Unknown / Multiple
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: "e.g. 25.0.1"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Stack Trace
      render: text

