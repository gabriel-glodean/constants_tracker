name: Feature Request
description: Suggest a new feature or enhancement
labels: [ "enhancement" ]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is the current behaviour insufficient?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - constant-extractor-api
        - constant-extractor-bytecode
        - constant-extractor-config-file
        - constant-tracker-app
        - search-ui
        - New module / Unknown
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, screenshots, or anything else that might help.

