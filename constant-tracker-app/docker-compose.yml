services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_DB: constant_tracker
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${POSTGRES_HOST_PATH:-./.postgres_data}:/var/lib/postgresql/data"
    networks:
      - app_network

  solr:
    image: solr:latest
    container_name: solr
    # Precreate core if it doesn't exist, then run in foreground
    command:
      - bash
      - -lc
      - >
        if [ ! -d /var/solr/data/${SOLR_CORE:-Constants} ];
        then solr-precreate ${SOLR_CORE:-Constants};
        fi && exec solr-foreground
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      # Host path where your Solr core data lives
      # You can override SOLR_HOST_PATH in .env or environment
      - "${SOLR_HOST_PATH:-./.solr_data}:/var/solr/data"
    networks:
      - app_network

  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app_network

  app:
    image: "${APP_IMAGE_NAME:-constant_tracker}:${APP_IMAGE_TAG:-latest}"
    container_name: "${APP_IMAGE_NAME:-constant_tracker}"
    depends_on:
      - solr
      - redis
      - postgres
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - SERVER_PORT=8080
      # Solr base URL for Spring Data Solr / SolrJ
      - SPRING_DATA_SOLR_HOST=http://solr:8983/solr
      - CONSTANTS_SOLR_URL=http://solr:8983/solr/
      # Redis wiring
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # PostgreSQL R2DBC
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/constant_tracker
      - SPRING_R2DBC_USERNAME=${SPRING_R2DBC_USERNAME}
      - SPRING_R2DBC_PASSWORD=${SPRING_R2DBC_PASSWORD}
      # Flyway (JDBC for schema migrations)
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/constant_tracker
      - SPRING_FLYWAY_USER=${SPRING_FLYWAY_USER}
      - SPRING_FLYWAY_PASSWORD=${SPRING_FLYWAY_PASSWORD}
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

