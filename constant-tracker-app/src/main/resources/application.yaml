server:
  shutdown: graceful

#spring configuration
spring:
  application.name: constant-tracker
  lifecycle:
    timeout-per-shutdown-phase: 30s
  output:
    ansi:
      enabled: always
  cache:
    type: redis
  data.redis:
    host: ${SPRING_DATA_REDIS_HOST:localhost}
    port: ${SPRING_DATA_REDIS_PORT:6379}
  # R2DBC – reactive PostgreSQL connection (full model store)
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/constant_tracker}
    username: ${SPRING_R2DBC_USERNAME:postgres}
    password: ${SPRING_R2DBC_PASSWORD:}
    pool:
      # Each concurrent class-file store needs its own connection (R2DBC is serial per
      # connection). Pool sized to 20 so up to 20 class stores run truly in parallel.
      max-size: 20
      initial-size: 5
  # Flyway – JDBC-based schema migrations (separate from R2DBC)
  flyway:
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/constant_tracker}
    user: ${SPRING_FLYWAY_USER:postgres}
    password: ${SPRING_FLYWAY_PASSWORD:}
    locations: classpath:db/migration
logging.level:
  org.springframework.web: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    r2dbc:
      enabled: false   # replaced by the named PostgresHealthIndicator
  metrics:
    tags:
      application: constant-tracker

#our config
constants:
  solr:
    url: ${CONSTANTS_SOLR_URL:http://localhost:8983/solr/}
    outbox:
      # Interval between drain cycles in milliseconds (default: 5 s)
      drain-interval-ms: ${CONSTANTS_SOLR_OUTBOX_DRAIN_INTERVAL_MS:5000}
      # Cron expression for the dead-letter compaction job (default: every night at 03:00)
      compaction-cron: ${CONSTANTS_SOLR_OUTBOX_COMPACTION_CRON:0 0 3 * * *}
  cors:
    allowed-origin: ${CONSTANTS_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    enabled: ${CONSTANTS_AUTH_ENABLED:true}
    bcrypt-strength: ${CONSTANTS_AUTH_BCRYPT_STRENGTH:12} # OWASP-recommended work factor (was 10)
    jwt:
      secret: ${CONSTANTS_AUTH_JWT_SECRET:dev-only-secret-key-change-in-production-32ch}
      expiration-ms: ${CONSTANTS_AUTH_JWT_EXPIRATION_MS:3600000} # 1 hour
    refresh-token:
      ttl-ms: ${CONSTANTS_AUTH_REFRESH_TOKEN_TTL_MS:604800000} # 7 days
    cleanup:
      # Cron for purging expired rows from auth_token_blacklist (default: 02:00 daily)
      blacklist-cron: ${CONSTANTS_AUTH_CLEANUP_BLACKLIST_CRON:0 0 2 * * *}
      # Cron for purging expired rows from auth_refresh_tokens (default: 02:15 daily)
      refresh-tokens-cron: ${CONSTANTS_AUTH_CLEANUP_REFRESH_TOKENS_CRON:0 15 2 * * *}
  cache:
    ttl-seconds: ${CONSTANTS_CACHE_TTL_SECONDS:3600} # 1 hour
